# Netlify: New → Import from Git → set Base directory to `horizon-user-app`.
# API URL for production builds is set below.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://api.horizonhub.com.au"

[[redirects]]  from = "/*"
  to = "/index.html"
  status = 200
